agnes:
  version: 4

config:
  path: .agnes
  encryption_key: '%env(ANGES_ENCRYPTION_KEY)%'
  repository:
    url: git@gitlab.com:agnes-config/famoser-famoser.ch.git

build:
  path: .build

github:
  api_token: '%env(GITHUB_API_TOKEN)%'
  repository: famoser/famoser.ch

data:
  files:
    - path: .env.local
      required: true
      encrypted: true

scripts:
  build:
    hook: build
    script:
      - rm -rf projects scripts
